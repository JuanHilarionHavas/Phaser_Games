  <script type="text/javascript" gwd-events="handlers">
    window.gwd = window.gwd || {};
    gwd.initGame = function(event) {
      const main_assets = "./"
        /**
         * =====================================================
         * CONFIGURACION DEL JUEGO PROSEGUR - DETECTA AL INTRUSO
         * Cada propiedad lleva un comentario en espanol.
         * =====================================================
         */
      window.gwd.GAME_CONFIG = {
        width: 300, // ancho del juego en px (canvas y wrapper)
        height: 600, // alto del juego en px (canvas y wrapper)
        assetsPath: main_assets, // carpeta base de los assets
             // ===== FONDO (plano de la casa) =====
      background: {
        key: "fondo",              // nombre interno de la textura en Phaser
        path: "Fondo.png"          // archivo del fondo (relativo a assetsPath)
      },

      // ===== INTRUSO =====
      intruso: {
        key: "intruso",            // nombre interno de la textura en Phaser
        path: "Intruso.png",       // archivo del intruso (relativo a assetsPath)
        scale: 0.15,               // escala del sprite (cada frame del spritesheet es 249x300)
        animado: true,             // true = reproduce la animacion de carrera; false = frame estatico
        spritesheet: {             // datos del spritesheet Intruso.png (2498x300, ciclo de carrera)
          frameWidth: 249,         // ancho de cada frame (10 frames ~ 2498/10)
          frameHeight: 300,        // alto de cada frame
          frameCount: 10           // numero de frames del ciclo de carrera
        },
        strideDistance: 45,        // px que el intruso recorre por ciclo de carrera; el frameRate se deriva del moveSpeed (animacion acorde a la velocidad)
        randomPosition: true,      // true = posicion aleatoria en spawnArea; false = usa fixedPosition
        fixedPosition: { x: 150, y: 330 }, // coordenadas fijas cuando randomPosition = false
        spawnArea: {               // rectangulo donde puede aparecer al azar (interior de la casa)
          xMin: 40,                // limite izquierdo (px)
          xMax: 250,               // limite derecho (px)
          yMin: 100,               // limite superior (px) - debajo de la terraza exterior
          yMax: 480               // limite inferior (px) - encima del jardin/entrada
        },
        moving: true,             // true = el intruso se desplaza suave por el spawnArea
        moveSpeed: 60,             // velocidad del desplazamiento en px por segundo
        movePause: 400             // pausa en ms al llegar a cada punto antes de seguir
      },

      // ===== LINTERNA (overlay oscuro + mascara radial invertida) =====
      flashlight: {
        radius: 45,                // radio del haz de luz visible en px (igual al detectRadius)
        softness: 0.6,            // suavidad del borde del haz (0 = borde duro, 1 = muy difuso)
        darkness: 1,            // opacidad de la oscuridad fuera del haz (1 = negro total)
        color: 0x000000,           // color de la oscuridad (hex)
        mobileOffsetY: -70         // solo en tactil: sube el haz respecto al dedo para que no lo tape (negativo = arriba)
      },

      // ===== DETECCION (por proximidad cursor <-> intruso) =====
      detection: {
        detectRadius: 45,          // distancia en px cursor<->intruso para considerarlo "encontrado"
        holdTime: 1000             // ms que hay que mantener la luz sobre el intruso antes de la alarma (0 = inmediato)
      },

      // ===== ALARMA (efecto al encontrar al intruso) =====
      alarm: {
        flashColor: 0xff0000,      // color del parpadeo de alarma (hex, rojo)
        flashAlpha: 0.45,          // opacidad maxima del parpadeo (0 a 1)
        flashDuration: 250,        // duracion de cada parpadeo en ms
        flashCount: 3,             // numero de parpadeos
        revealHouseOnFound: true   // true = ilumina toda la casa durante la alarma
      },

      // ===== CRONOMETRO (manejado en el DOM) =====
      timer: {
        enabled: true,             // activa/desactiva el cronometro
        selector: "#time-display", // selector del elemento DOM donde se muestra el tiempo
        label: "Tiempo:",          // texto que precede al numero (ej. "Tiempo: 15")
        startOn: "firstMove"       // cuando arranca: "firstMove" (al mover el cursor) | "load" (al cargar)
      },

      // ===== PRODUCCION / FIN DE JUEGO =====
      restartOnFound: true,        // true = reinicia tras encontrarlo (Proyecto); GWD lo pondra en false
      restartDelay: 1200,          // espera en ms antes de reiniciar, tras la alarma
      onFoundCallback: null,       // funcion(segundos) opcional - gancho para que el GWD/banner avance

      // ===== DEBUG (ayuda para calibrar; dejar enabled:false en produccion) =====
      debug: {
        enabled: false,            // true = muestra ayudas visuales para calibrar el juego
        showSpawnArea: true,       // dibuja el rectangulo donde puede aparecer el intruso
        showDetectRadius: true,    // dibuja el circulo de deteccion alrededor del intruso
        dimDarkness: 0.15          // opacidad de la oscuridad en modo debug (baja para ver el plano)
      }
      };
      const t = window.gwd.GAME_CONFIG.timer;
      let seconds = 0,
        intervalId = null,
        running = false;
      const el = () => document.querySelector(t.selector);

      function render() {
        const e = el();
        if (e) e.textContent = `${t.label} ${seconds}`;
      }
      window.startTimer = function() {
        if (!t.enabled || running) return;
        running = true;
        intervalId = setInterval(function() {
          seconds++;
          render();
        }, 1000);
      };
      window.stopTimer = function() {
        if (intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
        running = false;
      };
      window.resetTimer = function() {
        seconds = 0;
        render();
      };
      window.getTimerSeconds = function() {
        return seconds;
      };
      render(); // muestra "Tiempo: 0" al cargar
      const config = {
        type: Phaser.AUTO,
        width: window.gwd.GAME_CONFIG.width,
        height: window.gwd.GAME_CONFIG.height,
        parent: 'Container_Game',
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: [PreloaderScene, GameScene]
      };
      const game = new Phaser.Game(config);
      window.game = game;
    };

    };
    gwd.restargame = function(event) {
      if (typeof game !== "undefined" && game) {
        game.scene.keys["GameScene"].scene.restart();
        console.log("Reiniciando Juego")
      }
    };
  </script>
