  <script type="text/javascript" gwd-events="handlers">

    gwd.initGame = function(event) {
      const main_assets = "./"

         * Cada propiedad lleva un comentario en espanol.

         */

          image: "bg_field.png",
          size: { width: 300, height: 600 },
          displayWidth: 300, displayHeight: 600,
          displayX: 150, displayY: 300,
          originX: 0.5, originY: 0.5
        },

        // Arco logico: coordenadas donde el balon "entra" al arco

        // Arquero: 6 zonas de atajada (3 columnas x 2 filas)

          position: { x: 150, y: 365 },
          scale: 0.32,
          spritesheets: {
            idle: { file: 'gk_idle/Idle.png', frameWidth: 285, frameHeight: 386, frameCount: 7 },
            gk_save_up_left: { file: 'gk_save_up_left/Up_Left.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
            gk_save_up_right: { file: 'gk_save_up_right/Up_Right.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
            gk_save_center_up: { file: 'gk_save_center_up/Center_Up.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
            gk_save_down_left: { file: 'gk_save_down_left/Down_Left.png', frameWidth: 285, frameHeight: 386, frameCount: 14 },
            gk_save_down_right: { file: 'gk_save_down_right/Down_Right.png', frameWidth: 285, frameHeight: 386, frameCount: 14 },
            gk_save_center_down: { file: 'gk_save_center_down/Center_Down.png', frameWidth: 284, frameHeight: 386, frameCount: 15 }
          },
          zoneOffsets: {
            'high-left': { dx: -42, dy: -20 },
            'high-center': { dx: 0, dy: -12 },
            'high-right': { dx: 42, dy: -20 },
            'low-left': { dx: -50, dy: 0 },
            'low-center': { dx: 0, dy: 0 },
            'low-right': { dx: 50, dy: 0 }
          },
          zoneAnim: {
            'high-left': 'gk_save_up_left',
            'high-center': 'gk_save_center_up',
            'high-right': 'gk_save_up_right',
            'low-left': 'gk_save_down_left',
            'low-center': 'gk_save_center_down',
            'low-right': 'gk_save_down_right'
          },
          diveDuration: 200,
          highJumpPct: 0.45,
          preShiftX: 0,
          preShiftDurationMs: 0,
          returnDuration: 400,
          idleFrameRate: 6,
          diveFrameRate: 30,
          diveTimingPct: 0.05,
          tellEnabled: true,   // el arquero anticipa un lado antes del tiro
          tellBias: 0.7,       // prob. de cumplir el tell (0.3 = finta)
          tellShiftX: 15       // px que se inclina hacia el lado del tell
        },

        // Balon sobre el punto penal
        ball: {
          image: "ball.png",
          startPos: { x: 155, y: 420 },
          startScale: 0.35,
          endScale: 0.08,
          spritesheet: { frameWidth: 172, frameHeight: 172, frameCount: 12 },
          rotation: { minFrameRate: 6, maxFrameRate: 30 },
          flightEase: 'Expo.easeOut'
        },

        // Flecha de direccion (oscila apuntando al arco)
        arrow: { angleRangeDeg: 40, sweepHalfPeriodMs: 1200 },

        // Barra de potencia (vertical, segmentada)
        powerBar: { x: 12, y: 410, w: 16, h: 170, segments: 15, segmentGap: -1, bgColor: 0x111111, borderColor: 0x444444, chargeRatePerMs: 0.13 },

        // Mecanica del disparo
        shot: {
          totalShots: 5,
          flightDurationMs: 550,
          heightBands: { lowMax: 25, midMax: 55, highMax: 92, overMax: 100 },

          wideAngleThresholdDeg: 36

        button: { selector: "#kick-btn", label: "PATEAR" },

        messages: { goal: "¡GOL!", save: "¡ATAJADA!", miss: "¡AFUERA!" },
        messageDurationMs: 850,

        // DEBUG: dejar enabled:false en produccion
        debug: { enabled: false, showGoalMouth: true, showSaveZones: true, showLandingBands: true },

        ui: {
          feedbackSelector: "#feedback-message",
          kickBtnSelector: "#kick-btn",
          arrowSelector: "#kick-arrow",
          endOverlaySelector: "#end-overlay",
          endScoreSelector: "#end-score",
          endRestartSelector: "#end-restart"
        },

        // Fin de juego en GWD: imprime el resultado y pasa a la pagina final (End_Page)
        onGameEnd: function (finalScore, totalShots) {
          var deck = document.getElementById('pagedeck');
          var scoreEl = (deck && deck.getElementById) ? deck.getElementById('score') : document.getElementById('score');
          if (scoreEl) scoreEl.innerText = finalScore + ' DE ' + totalShots;
          setTimeout(function () {
            gwd.actions.gwdPagedeck.goToPage('pagedeck', 'End_Page', 'fade', 1000, 'ease-in-out', 'bottom');
          }, 900);
        }
      };
      const t = window.gwd.GAME_CONFIG.timer;
      let seconds = 0,
        intervalId = null,
        running = false;
      const el = () => document.querySelector(t.selector);

      function render() {
        const e = el();
        if (e) e.textContent = `${t.label} ${seconds}`;
      }
      window.startTimer = function() {
        if (!t.enabled || running) return;
        running = true;
        intervalId = setInterval(function() {
          seconds++;
          render();
        }, 1000);
      };
      window.stopTimer = function() {
        if (intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
        running = false;
      };
      window.resetTimer = function() {
        seconds = 0;
        render();
      };
      window.getTimerSeconds = function() {
        return seconds;
      };
      render(); // muestra "Tiempo: 0" al cargar
      const config = {
        type: Phaser.AUTO,
        width: window.gwd.GAME_CONFIG.width,
        height: window.gwd.GAME_CONFIG.height,
        parent: 'Container_Game',
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: [PenaltyScene]
      };
      const game = new Phaser.Game(config);
      window.game = game;
    };

    gwd.restargame = function(event) {
      if (typeof game !== "undefined" && game) {
        game.scene.keys["GameScene"].scene.restart();
        console.log("Reiniciando Juego")
      }
    };
  </script>

    gwd.actions.events.deregisterEventHandlers = function(event) {

      gwd.actions.events.removeHandler('Game_Page', 'pageactivated', gwd.restargame, false);
    };
    document.addEventListener("DOMContentLoaded", gwd.actions.events.registerEventHandlers);
    document.addEventListener("unload", gwd.actions.events.deregisterEventHandlers);

       * custom elements have been registered and upgraded.
       */
      function handleWebComponentsReady(event) {
        // Start the Ad lifecycle.
        requestAnimationFrame(function() {
          setTimeout(function() {
            gwdAd.initAd();
          }, 1);
        });
      }

      /**
       * Handles the event that is dispatched after the Ad has been
       * initialized and before the default page of the Ad is shown.
       */

      window.addEventListener('DOMContentLoaded',
        handleDomContentLoaded, false);
      window.addEventListener('WebComponentsReady',
        handleWebComponentsReady, false);
      window.addEventListener('adinitialized',
        handleAdInitialized, false);
    })();
