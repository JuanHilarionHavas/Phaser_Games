<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Penalty Shooter - Drive Them Crazy</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    window.GAME_CONFIG = {
      assetsBase: "assets/images/",

      // Fondo: imagen exacta 300x600. Se dibuja tal cual, sin escalado ni crops.
      background: {
        image: "bg_field.png",
        size: { width: 300, height: 600 },
        displayWidth: 300,
        displayHeight: 600,
        displayX: 150,
        displayY: 300,
        originX: 0.5, originY: 0.5
      },

      // Arco lógico: coordenadas donde el balón "entra" al arco en el canvas.
      // Medido sobre el asset bg_field.png (300x600): travesaño ~y=283, línea de
      // gol ~y=395, postes ~x=50..250.
      goal: {
        mouthLeft: 55,
        mouthRight: 245,
        crossbarY: 285,    // travesaño (Y mínima donde un tiro pasa por arriba)
        groundY: 395       // línea de gol (Y de aterrizaje de tiros rasantes)
      },

      // Arquero: chiquito, justo debajo del travesaño dentro del arco.
      // 6 zonas de atajada (3 columnas × 2 filas).
      keeper: {
        position: { x: 150, y: 365 },   // pies en la línea de gol
        scale: 0.32,                     // más pequeño para reforzar profundidad

        // Spritesheets del arquero: cada clave coincide con la animación en zoneAnim.
        // frameWidth/frameHeight = tamaño de cada frame dentro del strip.
        // frameCount = cantidad real de frames (Phaser los detecta automáticamente,
        //              pero se declara aquí para que sea fácilmente tuneable).
        spritesheets: {
          idle: { file: 'gk_idle/Idle.png', frameWidth: 285, frameHeight: 386, frameCount: 7 },
          gk_save_up_left: { file: 'gk_save_up_left/Up_Left.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
          gk_save_up_right: { file: 'gk_save_up_right/Up_Right.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
          gk_save_center_up: { file: 'gk_save_center_up/Center_Up.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
          gk_save_down_left: { file: 'gk_save_down_left/Down_Left.png', frameWidth: 285, frameHeight: 386, frameCount: 14 },
          gk_save_down_right: { file: 'gk_save_down_right/Down_Right.png', frameWidth: 285, frameHeight: 386, frameCount: 14 },
          gk_save_center_down: { file: 'gk_save_center_down/Center_Down.png', frameWidth: 284, frameHeight: 386, frameCount: 15 }
        },

        // Offsets al tirarse a cada zona, relativos a position:
        zoneOffsets: {
          'high-left': { dx: -25, dy: -20 },
          'high-center': { dx: 0, dy: -12 },
          'high-right': { dx: 25, dy: -20 },
          'low-left': { dx: -50, dy: 0 },
          'low-center': { dx: 0, dy: 0 },
          'low-right': { dx: 50, dy: 0 }
        },
        // Mapeo zona → clave de animación (debe coincidir con claves en spritesheets)
        zoneAnim: {
          'high-left': 'gk_save_up_left',
          'high-center': 'gk_save_center_up',
          'high-right': 'gk_save_up_right',
          'low-left': 'gk_save_down_left',
          'low-center': 'gk_save_center_down',
          'low-right': 'gk_save_down_right'
        },
        diveDuration: 200,         // ms que tarda el portero en tirarse (↓ = más rápido)
        highJumpPct: 0.45,         // % del dive que dedica a saltar antes de moverse en X (altos laterales)
        preShiftX: 0,              // px de paso lateral previo al dive (0 = sin pre-movimiento)
        preShiftDurationMs: 0,     // duración del paso lateral
        returnDuration: 400,       // ms que tarda en volver al centro después de un tiro
        idleFrameRate: 6,
        diveFrameRate: 30,
        diveTimingPct: 0.05,       // 0 = reacciona inmediatamente, 0.5 = espera mitad del vuelo
        aiBias: 0.45      // probabilidad de leer correctamente la zona del balón
      },

      // Balón: parado sobre el punto penal (más adelante = más grande en perspectiva)
      ball: {
        image: "ball.png",
        startPos: { x: 155, y: 420 },   // más adelante (abajo) en perspectiva
        startScale: 0.35,                // un poco más grande para reforzar cercanía
        endScale: 0.08,                 // muy pequeño al llegar al arco (efecto lejanía)

        // Spritesheet de rotación del balón
        spritesheet: {
          frameWidth: 172,   // cada frame es 172×174px (2px de gap lateral)
          frameHeight: 172,
          frameCount: 12
        },
        // Velocidad de giro según potencia (0–100)
        rotation: {
          minFrameRate: 6,   // potencia baja  → gira suave
          maxFrameRate: 30    // potencia máxima → gira rápido
        },

        // Timing del vuelo: Back.easeOut = arranca explosivo con ligero overshoot
        // Alternativas: 'Expo.easeOut' (sin overshoot), 'Quint.easeOut' (más suave)
        flightEase: 'Expo.easeOut'
      },

      // Flecha de dirección: arriba del balón apuntando al arco
      arrow: {
        position: { x: 140, y: 380 },
        scale: 0.4,
        angleRangeDeg: 40,
        sweepHalfPeriodMs: 1200
      },

      // Barra de potencia (vertical, lado izquierdo, segmentada)
      powerBar: {
        x: 12, y: 410, w: 16, h: 170,
        segments: 15,           // cantidad de segmentos
        segmentGap: -1,          // px de separación entre segmentos
        bgColor: 0x111111,
        borderColor: 0x444444,
        chargeRatePerMs: 0.13
      },

      // Mecánica del disparo
      shot: {
        totalShots: 5,
        flightDurationMs: 550,     // ms que tarda el balón en llegar al arco (↓ = más rápido)
        // Bandas de potencia (%) → altura del tiro
        heightBands: { lowMax: 25, midMax: 55, highMax: 92, overMax: 100 },
        // Y de llegada del balón por banda (dentro del arco: crossbarY=285..groundY=395).
        //   low (rasante) → 390 (pegado al piso)
        //   mid           → 350
        //   high (al 9)   → 300 (cerca del travesaño, aún adentro)
        //   over          → 250 (por encima del travesaño → miss)
        landingY: { low: 340, mid: 310, high: 280, over: 250 },
        // Umbral Y que separa filas "low" vs "high" del arquero
        highLowThresholdY: 340,
        saveRadiusX: 35,            // distancia en X para que el portero ataje
        saveRadiusY: 35,            // distancia en Y para que el portero ataje
        directionSpreadX: 140,      // permite que los tiros lleguen a las esquinas del arco
        wideAngleThresholdDeg: 42   // ángulos más allá de ±37° → fuera automático
      },

      // Botón PATEAR: ahora está en el DOM (#kick-btn). Config sólo guarda label y selector.
      button: {
        selector: "#kick-btn",
        label: "PATEAR"
      },

      messages: { goal: "¡GOL!", save: "¡ATAJADA!", miss: "¡AFUERA!" },
      messageDurationMs: 850,

      ui: {
        shotCounterSelector: "#shot-counter",
        scoreSelector: "#score-value",
        feedbackSelector: "#feedback-message",
        kickBtnSelector: "#kick-btn",
        arrowSelector: "#kick-arrow",
        endOverlaySelector: "#end-overlay",
        endScoreSelector: "#end-score",
        endRestartSelector: "#end-restart"
      },

      onGameEnd: function (finalScore, totalShots) {
        const overlay = document.querySelector(window.GAME_CONFIG.ui.endOverlaySelector);
        const scoreEl = document.querySelector(window.GAME_CONFIG.ui.endScoreSelector);
        if (scoreEl) scoreEl.textContent = finalScore + " DE " + totalShots;
        if (overlay) overlay.style.display = 'flex';
        console.log("Partida terminada:", finalScore, "/", totalShots);
      }
    };
  </script>
  <script src="./main.js"></script>
</head>

<body>
  <div id="ui-bar">
    <div id="ui-shot" class="ui-cell">
      <span class="ui-label">Tiro</span>
      <span id="shot-counter">1/5</span>
    </div>
    <div id="ui-score" class="ui-cell">
      <span class="ui-label">Goles</span>
      <span id="score-value">0</span>
    </div>
  </div>

  <div id="game-container">
    <div id="feedback-message"></div>

    <div id="kick-arrow">
      <svg viewBox="0 0 80 140" width="100%" height="100%">
        <polygon points="40,6 74,58 54,58 54,130 26,130 26,58 6,58" fill="#e6ff00" stroke="#111" stroke-width="4"
          stroke-linejoin="round" />
      </svg>
    </div>

    <button id="kick-btn">PATEAR</button>

    <div id="end-overlay">
      <div id="end-title">¡MUY BIEN!</div>
      <div id="end-subtitle">ANOTASTE</div>
      <div id="end-score">0 DE 5</div>
      <div id="end-goals-label">GOLES</div>
      <button id="end-restart">JUGAR DE NUEVO</button>
    </div>
  </div>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #ui-bar {
      width: 300px;
      margin: 8px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      color: #e6ff00;
      background: #181818;
      border-radius: 10px;
      padding: 8px 14px;
      box-sizing: border-box;
      font-size: 16px;
      font-weight: bold;
    }

    .ui-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ui-label {
      color: #aaa;
      font-size: 12px;
      font-weight: normal;
      letter-spacing: 1px;
    }

    #shot-counter,
    #score-value {
      font-size: 22px;
      color: #fff;
    }

    #game-container {
      position: relative;
      width: 300px;
      height: 600px;
    }

    #game-container canvas {
      width: 300px !important;
      height: 600px !important;
      max-width: 300px;
      max-height: 600px;
      min-width: 300px;
      min-height: 600px;
      box-sizing: content-box;
      display: block;
    }

    #feedback-message {
      position: absolute;
      top: 75%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      font-size: 44px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 4px #000, 3px 3px 0 #000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease-out, transform 0.25s cubic-bezier(0.2, 1.3, 0.4, 1);
      z-index: 5;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #feedback-message.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #feedback-message.goal {
      color: #00ff88;
    }

    #feedback-message.save {
      color: #ff9900;
    }

    #feedback-message.miss {
      color: #ff3333;
    }

    /* Flecha de dirección (arriba del botón PATEAR) */
    #kick-arrow {
      position: absolute;
      left: 50%;
      bottom: 72px;
      /* sobre el botón (botón está a bottom:18 + 46h + gap) */
      width: 40px;
      height: 70px;
      margin-left: -20px;
      /* centrado horizontal */
      transform-origin: 50% 100%;
      /* pivote en la base para rotar como péndulo */
      transform: rotate(0deg);
      pointer-events: none;
      z-index: 5;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.5));
      transition: opacity 0.15s ease-out;
    }

    #kick-arrow.hidden {
      opacity: 0;
    }

    /* Botón PATEAR (dentro del canvas, parte inferior) */
    #kick-btn {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 160px;
      height: 46px;
      background: #e6ff00;
      color: #111;
      border: 2px solid #111;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      z-index: 6;
      transition: transform 0.05s ease-out;
    }

    #kick-btn:active,
    #kick-btn.pressed {
      transform: translateX(-50%) scale(0.96);
    }

    #kick-btn[disabled] {
      opacity: 0.5;
      cursor: default;
    }

    #end-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 600px;
      background: rgba(0, 10, 30, 0.88);
      color: #fff;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 10;
      font-weight: 900;
    }

    #end-title {
      font-size: 28px;
      color: #e6ff00;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    #end-subtitle {
      font-size: 22px;
      letter-spacing: 2px;
    }

    #end-score {
      font-size: 54px;
      color: #e6ff00;
      margin: 8px 0;
      text-shadow: 0 0 8px rgba(230, 255, 0, 0.4);
    }

    #end-goals-label {
      font-size: 22px;
      letter-spacing: 4px;
      margin-bottom: 40px;
    }

    #end-restart {
      background: #e6ff00;
      color: #111;
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    #end-restart:active {
      transform: translateY(1px);
    }
  </style>

  <script>
    const config = {
      type: Phaser.AUTO,
      width: 300,
      height: 600,
      parent: 'game-container',
      fps: { target: 60, forceSetTimeOut: true },
      backgroundColor: '#0a0a14',
      scene: PenaltyScene
    };

    new Phaser.Game(config);
  </script>
</body>

</html>
