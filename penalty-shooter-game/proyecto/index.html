<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Penalty Shooter - Drive Them Crazy</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
    window.GAME_CONFIG = {
      assetsBase: "assets/images/",

      // Fondo: imagen exacta 300x600. Se dibuja tal cual, sin escalado ni crops.
      background: {
        image: "bg_field.png",
        size: { width: 300, height: 600 },
        displayWidth: 300,
        displayHeight: 600,
        displayX: 150,
        displayY: 300,
        originX: 0.5, originY: 0.5
      },

      // Arco lógico: coordenadas donde el balón "entra" al arco en el canvas.
      // Medido sobre el asset bg_field.png (300x600): travesaño ~y=283, línea de
      // gol ~y=395, postes ~x=50..250.
      goal: {
        mouthLeft: 55,
        mouthRight: 245,
        crossbarY: 285,    // travesaño (Y mínima donde un tiro pasa por arriba)
        groundY: 395       // línea de gol (Y de aterrizaje de tiros rasantes)
      },

      // Arquero: chiquito, justo debajo del travesaño dentro del arco.
      // 6 zonas de atajada (3 columnas × 2 filas).
      keeper: {
        position: { x: 150, y: 365 },   // pies en la línea de gol
        scale: 0.32,                     // más pequeño para reforzar profundidad

        // Spritesheets del arquero: cada clave coincide con la animación en zoneAnim.
        // frameWidth/frameHeight = tamaño de cada frame dentro del strip.
        // frameCount = cantidad real de frames (Phaser los detecta automáticamente,
        //              pero se declara aquí para que sea fácilmente tuneable).
        spritesheets: {
          idle: { file: 'gk_idle/Idle.png', frameWidth: 285, frameHeight: 386, frameCount: 7 },
          gk_save_up_left: { file: 'gk_save_up_left/Up_Left.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
          gk_save_up_right: { file: 'gk_save_up_right/Up_Right.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
          gk_save_center_up: { file: 'gk_save_center_up/Center_Up.png', frameWidth: 284, frameHeight: 386, frameCount: 15 },
          gk_save_down_left: { file: 'gk_save_down_left/Down_Left.png', frameWidth: 285, frameHeight: 386, frameCount: 14 },
          gk_save_down_right: { file: 'gk_save_down_right/Down_Right.png', frameWidth: 285, frameHeight: 386, frameCount: 14 },
          gk_save_center_down: { file: 'gk_save_center_down/Center_Down.png', frameWidth: 284, frameHeight: 386, frameCount: 15 }
        },

        // Offsets al tirarse a cada zona, relativos a position:
        zoneOffsets: {
          'high-left': { dx: -42, dy: -20 },   // mas lateral: el arquero alto alcanza la escuadra
          'high-center': { dx: 0, dy: -12 },
          'high-right': { dx: 42, dy: -20 },    // mas lateral: el arquero alto alcanza la escuadra
          'low-left': { dx: -50, dy: 0 },
          'low-center': { dx: 0, dy: 0 },
          'low-right': { dx: 50, dy: 0 }
        },
        // Mapeo zona → clave de animación (debe coincidir con claves en spritesheets)
        zoneAnim: {
          'high-left': 'gk_save_up_left',
          'high-center': 'gk_save_center_up',
          'high-right': 'gk_save_up_right',
          'low-left': 'gk_save_down_left',
          'low-center': 'gk_save_center_down',
          'low-right': 'gk_save_down_right'
        },
        diveDuration: 200,         // ms que tarda el portero en tirarse (↓ = más rápido)
        highJumpPct: 0.45,         // % del dive que dedica a saltar antes de moverse en X (altos laterales)
        preShiftX: 0,              // px de paso lateral previo al dive (0 = sin pre-movimiento)
        preShiftDurationMs: 0,     // duración del paso lateral
        returnDuration: 400,       // ms que tarda en volver al centro después de un tiro
        idleFrameRate: 6,
        diveFrameRate: 30,
        diveTimingPct: 0.05,       // 0 = reacciona inmediatamente, 0.5 = espera mitad del vuelo
        tellEnabled: true,   // el arquero anticipa un lado antes del tiro (telegrafia)
        tellBias: 0.7,       // prob. de cumplir el tell (0.3 = finta)
        tellShiftX: 15       // px que se inclina hacia el lado del tell durante IDLE
      },

      // Balón: parado sobre el punto penal (más adelante = más grande en perspectiva)
      ball: {
        image: "ball.png",
        startPos: { x: 155, y: 420 },   // más adelante (abajo) en perspectiva
        startScale: 0.35,                // un poco más grande para reforzar cercanía
        endScale: 0.08,                 // muy pequeño al llegar al arco (efecto lejanía)

        // Spritesheet de rotación del balón
        spritesheet: {
          frameWidth: 172,   // cada frame es 172×174px (2px de gap lateral)
          frameHeight: 172,
          frameCount: 12
        },
        // Velocidad de giro según potencia (0–100)
        rotation: {
          minFrameRate: 6,   // potencia baja  → gira suave
          maxFrameRate: 30    // potencia máxima → gira rápido
        },

        // Timing del vuelo: Back.easeOut = arranca explosivo con ligero overshoot
        // Alternativas: 'Expo.easeOut' (sin overshoot), 'Quint.easeOut' (más suave)
        flightEase: 'Expo.easeOut'
      },

      // Flecha de dirección: arriba del balón apuntando al arco
      arrow: {
        angleRangeDeg: 40,
        sweepHalfPeriodMs: 1200
      },

      // Barra de potencia (vertical, lado izquierdo, segmentada)
      powerBar: {
        x: 12, y: 410, w: 16, h: 170,
        segments: 15,           // cantidad de segmentos
        segmentGap: -1,          // px de separación entre segmentos
        bgColor: 0x111111,
        borderColor: 0x444444,
        chargeRatePerMs: 0.13
      },

      // Mecánica del disparo
      shot: {
        totalShots: 5,
        flightDurationMs: 550,     // ms que tarda el balón en llegar al arco (↓ = más rápido)
        // Bandas de potencia (%) → altura del tiro
        heightBands: { lowMax: 25, midMax: 55, highMax: 92, overMax: 100 },
        // Y de llegada por banda. Arco: crossbarY=285..groundY=395.
        //   low 340 (rasante) · mid 310 · high 292 (dentro, con margen sobre 285) · over 250 (afuera)
        landingY: { low: 340, mid: 310, high: 292, over: 250 },
        saveRadiusX: 50,            // distancia en X para atajar (amplio: el arquero se estira a los lados)
        saveRadiusY: 35,            // distancia en Y para que el portero ataje
        directionSpreadX: 175,      // dispersion horizontal del tiro segun el angulo de la flecha
        wideAngleThresholdDeg: 36   // |angulo| >= 36 -> tiro "afuera" (este umbral es el que produce el fallo por costado)
      },

      // Botón PATEAR: ahora está en el DOM (#kick-btn). Config sólo guarda label y selector.
      button: {
        selector: "#kick-btn",
        label: "PATEAR"
      },

      messages: { goal: "¡GOL!", save: "¡ATAJADA!", miss: "¡AFUERA!" },
      messageDurationMs: 850,

      // ===== DEBUG (ayudas de calibracion; dejar enabled:false en produccion) =====
      debug: {
        enabled: false,            // dibuja ayudas de calibracion sobre el campo
        showGoalMouth: false,      // marco del arco logico (zona donde es gol)
        showSaveZones: false,      // cajas de atajada de las 6 zonas del arquero (saveRadiusX/Y)
        showLandingBands: false    // lineas Y de las bandas de altura (low/mid/high/over)
      },

      ui: {
        feedbackSelector: "#feedback-message",
        kickBtnSelector: "#kick-btn",
        arrowSelector: "#kick-arrow",
        endOverlaySelector: "#end-overlay",
        endScoreSelector: "#end-score",
        endRestartSelector: "#end-restart"
      },

      onGameEnd: function (finalScore, totalShots) {
        const overlay = document.querySelector(window.GAME_CONFIG.ui.endOverlaySelector);
        const scoreEl = document.querySelector(window.GAME_CONFIG.ui.endScoreSelector);
        if (scoreEl) scoreEl.textContent = finalScore + " DE " + totalShots;
        if (overlay) overlay.style.display = 'flex';
        console.log("Partida terminada:", finalScore, "/", totalShots);
      }
    };
  </script>
  <script src="./main.js"></script>
</head>

<body>
  <div id="game-container">
    <div id="feedback-message"></div>

    <div id="scoreboard">
      <div class="score-slot"><img class="score-icon" alt=""></div>
      <div class="score-slot"><img class="score-icon" alt=""></div>
      <div class="score-slot"><img class="score-icon" alt=""></div>
      <div class="score-slot"><img class="score-icon" alt=""></div>
      <div class="score-slot"><img class="score-icon" alt=""></div>
    </div>

    <div id="kick-arrow">
      <div id="kick-arrow-tilt"><img src="assets/images/Flecha.png" alt=""></div>
    </div>

    <button id="kick-btn">PATEAR</button>

    <div id="end-overlay">
      <div id="end-title">¡MUY BIEN!</div>
      <div id="end-subtitle">ANOTASTE</div>
      <div id="end-score">0 DE 5</div>
      <div id="end-goals-label">GOLES</div>
      <button id="end-restart">JUGAR DE NUEVO</button>
    </div>
  </div>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #game-container {
      position: relative;
      width: 300px;
      height: 600px;
    }

    #game-container canvas {
      width: 300px !important;
      height: 600px !important;
      max-width: 300px;
      max-height: 600px;
      min-width: 300px;
      min-height: 600px;
      box-sizing: content-box;
      display: block;
    }

    #feedback-message {
      position: absolute;
      top: 75%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      font-size: 44px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 4px #000, 3px 3px 0 #000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease-out, transform 0.25s cubic-bezier(0.2, 1.3, 0.4, 1);
      z-index: 5;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    #feedback-message.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #feedback-message.goal {
      color: #00ff88;
    }

    #feedback-message.save {
      color: #ff9900;
    }

    #feedback-message.miss {
      color: #ff3333;
    }

    /* ===== Marcador de penaltis (BarraPuntos + Z's) ===== */
    #scoreboard {
      position: absolute;
      top: 130px;
      /* franja oscura bajo el logo (calibrar) */
      left: 50%;
      transform: translateX(-50%);
      width: 210px;
      height: 60px;
      /* ratio 349:99 */
      background: url('assets/images/BarraPuntos.png') no-repeat center / 100% 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      /* separacion entre casillas (calibrar) */
      padding: 0 16px;
      /* margen lateral del container (calibrar) */
      box-sizing: border-box;
      z-index: 6;
      pointer-events: none;
    }

    .score-slot {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .score-icon {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transform: scale(0);
      transition: transform 0.25s cubic-bezier(0.2, 1.3, 0.4, 1), opacity 0.2s ease-out;
    }

    .score-icon.shown {
      opacity: 1;
      transform: scale(1);
    }

    /* Flecha de dirección (arriba del botón PATEAR) */
    #kick-arrow {
      position: absolute;
      left: 50%;
      bottom: 64px;
      width: 120px;
      height: 130px;
      margin-left: -60px;
      perspective: 420px;
      /* contexto 3D para inclinar la flecha hacia el fondo */
      transform-origin: 50% 100%;
      /* pivote en la base para rotar como péndulo */
      transform: rotate(0deg);
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.15s ease-out;
    }

    #kick-arrow-tilt {
      position: absolute;
      inset: 0;
      transform-origin: 50% 100%;
      transform: rotateX(58deg);
      /* acuesta la flecha hacia el fondo: efecto a ras de pasto */
    }

    #kick-arrow img {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120px;
      /* tamano natural escalado (ratio 321:88) */
      height: auto;
      transform: translate(-50%, -50%) rotate(-90deg);
      /* horizontal -> apunta arriba */
      filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.55));
    }

    #kick-arrow.hidden {
      opacity: 0;
    }

    /* Botón PATEAR (dentro del canvas, parte inferior) — usa BotonPatear.png */
    #kick-btn {
      position: absolute;
      left: 50%;
      bottom: -42px;
      transform: translateX(-50%);
      width: 30%;
      height: 30%;
      /* ratio 251:122 */
      background: url('assets/images/BotonPatear.png') no-repeat center / contain;
      background-color: transparent;
      border: none;
      font-size: 0;
      /* oculta el texto "PATEAR" del DOM (el asset ya lo trae) */
      color: transparent;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      z-index: 6;
      transition: transform 0.05s ease-out;
    }

    #kick-btn:active,
    #kick-btn.pressed {
      transform: translateX(-50%) scale(0.96);
    }

    #kick-btn[disabled] {
      opacity: 0.5;
      cursor: default;
    }

    #end-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 600px;
      background: rgba(0, 10, 30, 0.88);
      color: #fff;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 10;
      font-weight: 900;
    }

    #end-title {
      font-size: 28px;
      color: #e6ff00;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    #end-subtitle {
      font-size: 22px;
      letter-spacing: 2px;
    }

    #end-score {
      font-size: 54px;
      color: #e6ff00;
      margin: 8px 0;
      text-shadow: 0 0 8px rgba(230, 255, 0, 0.4);
    }

    #end-goals-label {
      font-size: 22px;
      letter-spacing: 4px;
      margin-bottom: 40px;
    }

    #end-restart {
      background: #e6ff00;
      color: #111;
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    #end-restart:active {
      transform: translateY(1px);
    }
  </style>

  <script>
    // ===== API del marcador (Phaser la llama al resolver cada tiro) =====
    (function () {
      const board = document.getElementById('scoreboard');
      const icons = board ? Array.from(board.querySelectorAll('.score-icon')) : [];
      const base = 'assets/images/';
      window.markScoreboard = function (index, isGoal) {
        const icon = icons[index];
        if (!icon) return;
        icon.src = base + (isGoal ? 'Anotado.png' : 'Fallido.png');
        icon.classList.add('shown');
      };
      window.resetScoreboard = function () {
        icons.forEach(function (icon) {
          icon.classList.remove('shown');
          icon.removeAttribute('src');
        });
      };
      // Precargar iconos para que el primer "pop" no parpadee
      ['Anotado.png', 'Fallido.png'].forEach(function (n) { const im = new Image(); im.src = base + n; });
    })();

    const config = {
      type: Phaser.AUTO,
      width: 300,
      height: 600,
      parent: 'game-container',
      fps: { target: 60, forceSetTimeOut: true },
      backgroundColor: '#0a0a14',
      scene: PenaltyScene

    };

    new Phaser.Game(config);
  </script>
</body>

</html>
